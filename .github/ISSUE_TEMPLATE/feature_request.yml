name: "Feature request / 功能建议"
description: "Propose a safe, testable improvement / 提议安全且可验证的改进"
title: "[Feature] "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Explain the user problem before proposing an implementation. 中文或英文均可。
  - type: checkboxes
    id: preflight
    attributes:
      label: "Preflight / 提交前确认"
      options:
        - label: "I searched existing issues and the roadmap. / 我已搜索现有 Issue 和路线图。"
          required: true
        - label: "The request does not include private thesis content or credentials. / 请求中不含私密论文内容或凭证。"
          required: true
  - type: dropdown
    id: component
    attributes:
      label: "Target component / 目标组件"
      options:
        - "Codex skill workflow / Skill 工作流"
        - "DOCX profiler / DOCX 分析脚本"
        - "Word task pane / Word 任务窗格"
        - "API contract or deployment guidance / 接口契约或部署指南"
        - "Documentation or community / 文档或社区"
        - "Other / 其他"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: "Problem to solve / 要解决的问题"
      description: "Who is affected, and what is difficult today?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Proposed outcome / 期望结果"
      description: "Describe observable behavior and a safe acceptance test."
    validations:
      required: true
  - type: textarea
    id: authority
    attributes:
      label: "Formatting authority or example / 格式依据或示例"
      description: "Describe applicable rules. Link only to public, authorized sources."
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered / 已考虑的替代方案"
  - type: textarea
    id: privacy
    attributes:
      label: "Privacy, security, and compatibility / 隐私、安全与兼容性"
      description: "Explain document-data handling, Word/platform compatibility, and migration impact."
  - type: checkboxes
    id: boundaries
    attributes:
      label: "Project boundaries / 项目边界"
      options:
        - label: "I understand the project does not operate a hosted formatting backend or guarantee institutional acceptance. / 我了解项目不运营托管后端，也不保证学校最终验收。"
          required: true
        - label: "I can help test this with synthetic or authorized material. / 我可以使用合成或已获授权的材料协助测试。"
          required: false
